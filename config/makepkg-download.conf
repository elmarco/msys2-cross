#
# Minimal makepkg config for downloading sources on the host.
# Used by `msys2-cross download` — only needs DLAGENTS, PKGEXT, SRCEXT.
#

DLAGENTS=('file::/usr/bin/curl -qgC - -o %o %u'
          'ftp::/usr/bin/curl -qfC - --ftp-pasv --retry 3 --retry-delay 3 -o %o %u'
          'http::/usr/bin/curl -qb "" -fLC - --retry 3 --retry-delay 3 -o %o %u'
          'https::/usr/bin/curl -qb "" -fLC - --retry 3 --retry-delay 3 -o %o %u')

VCSCLIENTS=('git::git')

CARCH="x86_64"
PKGEXT=".pkg.tar.zst"
SRCEXT=".src.tar.zst"
