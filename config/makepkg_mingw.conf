#
# makepkg_mingw.conf — Linux cross-compilation config for UCRT64 packages.
# Adapted from MSYS2's /etc/makepkg_mingw.conf.
#

DLAGENTS=('file::/usr/bin/curl -qgC - -o %o %u'
          'ftp::/usr/bin/curl -qfC - --ftp-pasv --retry 3 --retry-delay 3 -o %o %u'
          'http::/usr/bin/curl -qb "" -fLC - --retry 3 --retry-delay 3 -o %o %u'
          'https::/usr/bin/curl -qb "" -fLC - --retry 3 --retry-delay 3 -o %o %u')

VCSCLIENTS=('bzr::bzr'
            'fossil::fossil'
            'git::git'
            'hg::hg'
            'svn::svn')

# Architecture
CARCH="x86_64"
CHOST="x86_64-w64-mingw32"

# Compiler flags
CPPFLAGS=""
CFLAGS="-march=nocona -msahf -mtune=generic -O2 -pipe"
CXXFLAGS="-march=nocona -msahf -mtune=generic -O2 -pipe"
LDFLAGS="-pipe"
LTOFLAGS="-flto=auto"

DEBUG_CFLAGS="-ggdb -Og"
DEBUG_CXXFLAGS="-ggdb -Og"

# Make flags
MAKEFLAGS="-j$(nproc)"

# Build environment
BUILDENV=(!distcc color !ccache check !sign)
BUILDDIR=/tmp/makepkg

# Package options
OPTIONS=(strip docs !libtool staticlibs emptydirs zipman purge !debug !lto !autodeps)

# File integrity checks
INTEGRITY_CHECK=(sha256)

# Stripping — use the cross-toolchain's strip
STRIP="/usr/bin/x86_64-w64-mingw32-strip"
OBJCOPY="/usr/bin/x86_64-w64-mingw32-objcopy"
STRIP_BINARIES="--strip-all"
STRIP_SHARED="--strip-unneeded"
STRIP_STATIC="--strip-debug"

# Compression
PKGEXT='.pkg.tar.zst'
SRCEXT='.src.tar.zst'

COMPRESSGZ=(gzip -c -f -n)
COMPRESSBZ2=(bzip2 -c -f)
COMPRESSXZ=(xz -c -z --threads=0 -)
COMPRESSZST=(zstd -c -z -q --threads=0 -)
COMPRESSLRZ=(lrzip -q)
COMPRESSLZO=(lzop -q)
COMPRESSZ=(compress -c -f)
COMPRESSLZ4=(lz4 -q)
COMPRESSLZ=(lzip -c -f)

# Package output
PACMAN_AUTH=()
PACKAGER="msys2-cross <msys2-cross@localhost>"

# tidy_strip override: use the cross-strip for PE/COFF binaries
MAN_DIRS=({usr{,/local}{,/share},opt/*}/{man,info})
DOC_DIRS=(usr/{,local/}{,share/}{doc,gtk-doc} opt/*/{doc,gtk-doc})
PURGE_TARGETS=(usr/{,share}/info/dir .packlist *.pod)
