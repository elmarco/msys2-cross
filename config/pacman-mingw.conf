#
# pacman-mingw.conf — pacman configuration for the MINGW cross-compilation sysroot.
# Separate DB and cache from any system pacman.
#

[options]
RootDir     = /
DBPath      = /var/lib/pacman/mingw/
CacheDir    = /var/cache/pacman/mingw/pkg/
LogFile     = /var/log/pacman-mingw.log
GPGDir      = /etc/pacman.d/gnupg/

Architecture = x86_64 auto

# Disable signature checking for local packages
SigLevel = Never

[msys2-cross]
Server = file:///opt/msys2-bootstrap/repo
